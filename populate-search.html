    window.populateDatabase = async function() {
      const btn = document.getElementById('populateBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      status.className = '';
      status.innerHTML = '<p>Populating database...</p>';

      try {
        const { data, error } = await supabaseClient
          .from('help_articles')
          .upsert(helpArticles, { onConflict: 'url' });

        if (error) throw error;

        status.className = 'success';
        status.innerHTML = `<p><strong>✓ Success!</strong> Populated ${helpArticles.length} articles.</p>`;
      } catch (error) {
        status.className = 'error';
        status.innerHTML = `<p><strong>✗ Error:</strong> ${error.message}</p><pre>${JSON.stringify(error, null, 2)}</pre>`;
      } finally {
        btn.disabled = false;
      }
    };

    window.clearDatabase = async function() {
      if (!confirm('Are you sure you want to clear all articles?')) return;

      const btn = document.getElementById('clearBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      status.className = '';
      status.innerHTML = '<p>Clearing database...</p>';

      try {
        const { error } = await supabaseClient
          .from('help_articles')
          .delete()
          .neq('id', '00000000-0000-0000-0000-000000000000');

        if (error) throw error;

        status.className = 'success';
        status.innerHTML = '<p><strong>✓ Success!</strong> Database cleared.</p>';
      } catch (error) {
        status.className = 'error';
        status.innerHTML = `<p><strong>✗ Error:</strong> ${error.message}</p><pre>${JSON.stringify(error, null, 2)}</pre>`;
      } finally {
        btn.disabled = false;

    };
